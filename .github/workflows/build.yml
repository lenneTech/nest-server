name: Build

on:
  push:
    branches:
      - '*/*'
      - '*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
        mongodb-version: ['7.0']
    steps:
      - name: Git checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: ${{ matrix.mongodb-version }}

      - name: Install dependencies
        run: pnpm install

      - name: Optimize and check
        run: pnpm run prepublishOnly

      # Compiles with SWC to CommonJS and loads every module under Node's CJS loader.
      # This is the ONLY step that can catch a temporal-dead-zone crash from an import
      # cycle: `nest build` uses tsc, and vitest runs SWC through Vite's module runner,
      # whose getter-based live bindings tolerate cycles. Consumers running
      # `nest start -b swc` do not get that safety net.
      # Builds into its own throwaway dir, so it cannot disturb the dist/ that Build
      # produces and Save build uploads.
      - name: SWC module-graph guard (TDZ)
        run: pnpm run check:swc-tdz

      - name: Build
        run: pnpm run build

      - name: Save build
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: ./dist
