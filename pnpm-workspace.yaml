# pnpm settings (single source of truth).
# pnpm 11 no longer reads the "pnpm" field in package.json, and .npmrc is auth/registry only
# (https://pnpm.io/blog/releases/11.0). Everything pnpm-specific lives here.

# Migrated from .npmrc (pnpm 11 no longer reads these from .npmrc):
nodeLinker: hoisted
autoInstallPeers: false
strictPeerDependencies: false

# Packages allowed to run install scripts (native builds). pnpm 11 merges the old
# onlyBuiltDependencies/neverBuiltDependencies into this single allowBuilds map.
allowBuilds:
  'bcrypt': true
  '@swc/core': true
  'esbuild': true
  '@nestjs/core': true
  '@compodoc/compodoc': true
  '@apollo/protobufjs': true
  '@scarf/scarf': false

peerDependencyRules:
  allowedVersions:
    '@apollo/server': '5'
    '@types/express': '5'
  ignoreMissing:
    - '@egjs/hammerjs'
    - 'keycharm'
    - 'vis-data'
    - 'vis-util'

# Security overrides: force vulnerable transitive deps onto patched versions.
# Pruned again on the 2026-07 maintenance run to the 1 still load-bearing (verified empirically:
# all overrides removed, reinstalled, `pnpm audit` + lockfile resolution checked). Removed as
# obsolete no-ops: ajv (@angular-devkit now pins 8.18.0+), picomatch (vite/vitest resolve 4.0.4+),
# js-yaml (@nestjs/swagger 11.4.6 requests >=4.2.0), uuid + @babel/core + websocket-driver
# (@compodoc/compodoc 2.0.0 dropped the live-server/babel chains and uses uuid 14.0.1 directly).
# pnpm 11 `pnpm audit` is the safety net for regressions.
overrides:
  # Security: Memory exhaustion DoS + uninitialized memory disclosure (GHSA-96hv-2xvq-fx4p, high, patched >=8.21.0) - transitive via @nestjs/graphql>ws and @nestjs/graphql>graphql-ws>ws (resolves to vulnerable 8.20.1 without this)
  'ws@>=8.0.0 <8.21.0': '8.21.1'
  # Security: Axios formDataToJSON recursion DoS + prototype pollution in auth subfields (3x moderate, patched >=1.18.0) - transitive via @getbrevo/brevo>axios and node-mailjet>axios
  'axios@<1.18.0': '1.18.1'
