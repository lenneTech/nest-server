# pnpm settings (single source of truth).
# pnpm 11 no longer reads the "pnpm" field in package.json, and .npmrc is auth/registry only
# (https://pnpm.io/blog/releases/11.0). Everything pnpm-specific lives here.

# Migrated from .npmrc (pnpm 11 no longer reads these from .npmrc):
nodeLinker: hoisted
autoInstallPeers: false
strictPeerDependencies: false

# Packages allowed to run install scripts (native builds). pnpm 11 merges the old
# onlyBuiltDependencies/neverBuiltDependencies into this single allowBuilds map.
allowBuilds:
  'bcrypt': true
  '@swc/core': true
  'esbuild': true
  '@nestjs/core': true
  '@compodoc/compodoc': true
  '@apollo/protobufjs': true
  '@scarf/scarf': false

peerDependencyRules:
  allowedVersions:
    '@apollo/server': '5'
    '@types/express': '5'
  ignoreMissing:
    - '@egjs/hammerjs'
    - 'keycharm'
    - 'vis-data'
    - 'vis-util'

# Security overrides: force vulnerable transitive deps onto patched versions.
#
# WARNING — these do NOT reach consumers of the published package. `overrides:` is honoured only
# for the ROOT project of an install, so a downstream project gets ITS OWN overrides, not these.
# A green `pnpm audit` here says nothing about a consumer's tree. The load-bearing entries are
# therefore mirrored in nest-server-starter and lt-monorepo, and documented for hand-rolled setups
# in docs/security-overrides.md (which ships, because `docs/**` is in package.json `files`).
#
# Last verified 2026-07-22 by resolving a lockfile with this block stripped:
#   LOAD-BEARING - removing them reintroduces a vulnerable version:
#     ws                 -> regresses to 8.20.1 (@nestjs/graphql pins it EXACTLY, so it cannot
#                           resolve forward on its own)
#     @hono/node-server  -> regresses to 1.19.14
#   INERT today - each already resolves to a patched version without help. Kept only as a pin, so
#   each one silently becomes a DOWNGRADE-LOCK the moment a newer patch ships upstream. Re-check
#   every maintenance run and drop what is no longer needed:
#     axios, brace-expansion x3, js-yaml, fast-uri, body-parser
#
# Every target MUST be a fixed version, never an unbounded range - see
# .claude/rules/package-management.md for the incident that rule exists to prevent.
# pnpm 11 `pnpm audit` is the safety net for regressions.
overrides:
  # Security: Memory exhaustion DoS + uninitialized memory disclosure (GHSA-96hv-2xvq-fx4p, high, patched >=8.21.0) - transitive via @nestjs/graphql>ws and @nestjs/graphql>graphql-ws>ws (resolves to vulnerable 8.20.1 without this)
  # LOAD-BEARING. Remove once @nestjs/graphql stops pinning ws 8.20.1 exactly.
  'ws@>=8.0.0 <8.21.0': '8.21.1'
  # Security: Axios formDataToJSON recursion DoS + prototype pollution in auth subfields (3x moderate, patched >=1.18.0) - transitive via node-mailjet>axios (@getbrevo/brevo dropped all runtime deps in v6)
  # Inert today (axios already resolves >=1.18.0). Remove once node-mailjet requests >=1.18.0 itself.
  'axios@<1.18.0': '1.18.1'
  # Security: brace-expansion DoS via exponential-time expansion of consecutive non-expanding {} groups (GHSA-3jxr-9vmj-r5cp, high) - one entry per affected major, each a patch bump INSIDE that major.
  # v5 (prod): ts-morph>@ts-morph/common>minimatch, directly and via @nestjs/graphql + @nestjs/apollo. v2/v1 (dev only): @nestjs/cli + @swc/cli > minimatch, @nestjs/cli>fork-ts-checker-webpack-plugin>minimatch.
  # The v5 key is floored at >=5.0.0 on purpose: a wider `>=3.0.0` would ALSO match a future 3.x/4.x
  # dependency and silently force it across two majors - which is not what "patch bump" means.
  # Inert today (all three resolve patched). Remove once minimatch requests the patched ranges.
  'brace-expansion@>=5.0.0 <5.0.7': '5.0.7'
  'brace-expansion@>=2.0.0 <2.1.2': '2.1.2'
  'brace-expansion@<1.1.16': '1.1.16'
  # Security: js-yaml quadratic CPU consumption via YAML merge-key chains (GHSA-52cp-r559-cp3m, high, patched >=4.3.0) - dev only, transitive via @compodoc/compodoc>cosmiconfig and @nestjs/cli>fork-ts-checker-webpack-plugin>cosmiconfig
  # Inert today. Remove once cosmiconfig requests >=4.3.0.
  'js-yaml@>=4.0.0 <4.3.0': '4.3.0'
  # Security: fast-uri host confusion via failed IDN canonicalization (GHSA-v2hh-gcrm-f6hx, high, patched >=3.1.3) and via literal backslash authority delimiter (high, patched >=3.1.4) - transitive via @modelcontextprotocol/sdk>ajv and @modelcontextprotocol/sdk>ajv-formats>ajv
  # Inert today. Remove once ajv / ajv-formats request >=3.1.4.
  'fast-uri@>=3.0.0 <3.1.4': '3.1.4'
  # Security: body-parser DoS on malformed urlencoded input (GHSA-v422-hmwv-36x6, low, patched >=2.3.0) - transitive via @apollo/server, @as-integrations/express5 and express itself (22 paths)
  # Inert today. Remove once express / @apollo/server request >=2.3.0.
  'body-parser@>=2.0.0 <2.3.0': '2.3.0'
  # NOTE: there is deliberately NO `hono` override.
  # The 3 moderate Hono advisories (GHSA-xgm2-5f3f-mvvc, GHSA-hvrm-45r6-mjfj, GHSA-w62v-xxxg-mg59)
  # are patched in >=4.12.27, and @modelcontextprotocol/sdk's `^4.11.4` resolves to 4.12.31 on its
  # own. A `hono@>=4.0.0 <4.12.27` -> `4.12.27` entry looked harmless but was a HARD PIN: pnpm
  # replaces the whole matched spec with the target, so it dragged hono BACK four patch releases and
  # would silently reintroduce anything fixed in 4.12.28-4.12.31. Do not re-add it.
  # Security: @hono/node-server path traversal in the static-file handler (GHSA-frvp-7c67-39w9, patched >=2.0.5) plus an unauthenticated memory leak in the 2.x line itself (GHSA-9mqv-5hh9-4cgg, patched >=2.0.10); both moderate.
  # Transitive via @modelcontextprotocol/sdk, which declares ^1.19.9 and ships NO 1.x fix line, so this is deliberately a cross-major override.
  # Verified safe: the SDK's only consumed symbol is `getRequestListener` (server/streamableHttp.js, loaded by core-ai-mcp.controller.ts), unchanged in 2.x as `(fetchCallback, options?)` and confirmed present at runtime. Engines `>=20` fit this package's `>= 22`, peer `hono@^4` is satisfied by the resolved 4.12.31.
  # LOAD-BEARING. Drop this entry as soon as @modelcontextprotocol/sdk moves its own range to ^2.
  '@hono/node-server@<2.0.10': '2.0.11'
