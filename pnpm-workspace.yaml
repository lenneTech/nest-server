# pnpm settings (single source of truth).
# pnpm 11 no longer reads the "pnpm" field in package.json, and .npmrc is auth/registry only
# (https://pnpm.io/blog/releases/11.0). Everything pnpm-specific lives here.

# Migrated from .npmrc (pnpm 11 no longer reads these from .npmrc):
nodeLinker: hoisted
autoInstallPeers: false
strictPeerDependencies: false

# Packages allowed to run install scripts (native builds). pnpm 11 merges the old
# onlyBuiltDependencies/neverBuiltDependencies into this single allowBuilds map.
allowBuilds:
  'bcrypt': true
  '@swc/core': true
  'esbuild': true
  '@nestjs/core': true
  '@compodoc/compodoc': true
  '@apollo/protobufjs': true
  '@scarf/scarf': false

peerDependencyRules:
  allowedVersions:
    '@apollo/server': '5'
    '@types/express': '5'
  ignoreMissing:
    - '@egjs/hammerjs'
    - 'keycharm'
    - 'vis-data'
    - 'vis-util'

# Security overrides: force vulnerable transitive deps onto patched versions.
# Pruned on the pnpm 11 upgrade to the 9 still load-bearing (each verified: removing it lets the
# package resolve back INTO the vulnerable range). 27 obsolete no-ops removed (parents upgraded);
# pnpm 11 `pnpm audit` (working again via the bulk endpoint) is the safety net for regressions.
overrides:
  # Security: prototype pollution - transitive via @nestjs/cli>@angular-devkit
  'ajv@>=7.0.0-alpha.0 <8.18.0': '8.18.0'
  # Security: @babel/core <7.29.6 advisory - transitive via @compodoc/compodoc>@babel/preset-env
  '@babel/core@<7.29.6': '7.29.6'
  # Security: ReDoS - transitive via vitest and vite
  'picomatch@>=4.0.0 <4.0.4': '4.0.4'
  # Security: Memory exhaustion DoS + uninitialized memory disclosure (GHSA-96hv-2xvq-fx4p) - transitive via @nestjs/graphql
  'ws@>=8.0.0 <8.21.0': '8.21.0'
  # Security: Missing buffer bounds check in v3/v5/v6 (GHSA-w5hq-g745-h8pq) - transitive via @compodoc/compodoc and @compodoc/compodoc>@compodoc/live-server>http-auth
  'uuid@<14.0.0': '14.0.0'
  # Security: fs.deny bypass on Windows alternate paths + file read CVEs - transitive via better-auth>vitest
  'vite@>=8.0.0 <8.0.16': '8.0.16'
  # Security: email/header injection CVEs <9.0.1 - direct dependency
  'nodemailer@<9.0.1': '9.0.1'
  # Security: unhandled multipart errors / DoS <2.2.0 - transitive via @nestjs/platform-express
  'multer@<2.2.0': '2.2.0'
  # Security: special-character handling / prototype pollution (patched in 4.2.0; 4.1.2 was never published) - transitive via @nestjs/swagger
  'js-yaml@<4.2.0': '4.2.0'
